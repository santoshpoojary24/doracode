<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body/Head -->
  <circle cx="100" cy="95" r="80" fill="#0096FF"/>
  <!-- White face area -->
  <ellipse cx="100" cy="108" rx="60" ry="52" fill="white"/>
  <!-- Eyes -->
  <circle cx="78" cy="72" r="18" fill="white"/>
  <circle cx="122" cy="72" r="18" fill="white"/>
  <circle cx="84" cy="68" r="10" fill="#1a1a1a"/>
  <circle cx="128" cy="68" r="10" fill="#1a1a1a"/>
  <circle cx="87" cy="65" r="4" fill="white"/>
  <circle cx="131" cy="65" r="4" fill="white"/>
  <!-- Nose -->
  <circle cx="100" cy="90" r="9" fill="#FF4757"/>
  <!-- Mouth line -->
  <path d="M 68 106 Q 100 132 132 106" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="35" y1="98" x2="82" y2="103" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="108" x2="82" y2="108" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="118" x2="82" y2="113" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="165" y1="98" x2="118" y2="103" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="108" x2="118" y2="108" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="118" x2="118" y2="113" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Bell/collar -->
  <rect x="72" y="148" width="56" height="14" rx="7" fill="#FF4757"/>
  <line x1="72" y1="155" x2="128" y2="155" stroke="#cc0000" stroke-width="1"/>
  <circle cx="100" cy="168" r="10" fill="#FFD700"/>
  <line x1="96" y1="171" x2="104" y2="171" stroke="#b8860b" stroke-width="2"/>
  <circle cx="100" cy="173" r="3" fill="#b8860b"/>
  <!-- Pocket -->
  <ellipse cx="100" cy="133" rx="25" ry="12" fill="none" stroke="white" stroke-width="2.5"/>
